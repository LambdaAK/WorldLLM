services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: python app.py --host 0.0.0.0 --port 8000 --redis_url redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    command: python worker.py --redis_url redis://redis:6379/0
    depends_on:
      - redis
