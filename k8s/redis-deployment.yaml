apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinygpt-redis
  namespace: tinygpt
  labels:
    app: tinygpt-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinygpt-redis
  template:
    metadata:
      labels:
        app: tinygpt-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
