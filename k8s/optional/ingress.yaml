apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tinygpt-api
  namespace: tinygpt
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: tinygpt.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tinygpt-api
                port:
                  number: 8000
