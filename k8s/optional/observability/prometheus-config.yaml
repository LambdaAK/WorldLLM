apiVersion: v1
kind: ConfigMap
metadata:
  name: tinygpt-prometheus-config
  namespace: tinygpt
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["127.0.0.1:9090"]

      - job_name: tinygpt-api
        metrics_path: /metrics
        static_configs:
          - targets: ["tinygpt-api.tinygpt.svc.cluster.local:8000"]
