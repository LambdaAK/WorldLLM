apiVersion: v1
kind: ConfigMap
metadata:
  name: tinygpt-grafana-provisioning
  namespace: tinygpt
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: TinyGPT Prometheus
        type: prometheus
        access: proxy
        url: http://tinygpt-prometheus.tinygpt.svc.cluster.local:9090
        isDefault: true
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: TinyGPT Dashboards
        orgId: 1
        folder: TinyGPT
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
