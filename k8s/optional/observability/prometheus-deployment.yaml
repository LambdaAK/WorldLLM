apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinygpt-prometheus
  namespace: tinygpt
  labels:
    app: tinygpt-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinygpt-prometheus
  template:
    metadata:
      labels:
        app: tinygpt-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: prometheus-config
          configMap:
            name: tinygpt-prometheus-config
